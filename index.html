    <script>
      let atTopOfPage = true;
      window.addEventListener("scroll", () => {
        atTopOfPage = window.scrollY === 0;
        document
          .querySelector("nav")
          .classList.toggle("scrolled", !atTopOfPage);
      });

      document.documentElement.classList.add(
        localStorage.theme === "light" ? "light" : "dark"
      );

      function toggleTheme() {
        if (localStorage.theme === "dark") {
          localStorage.theme = "light";
          document.documentElement.classList.remove("dark");
        } else {
          localStorage.theme = "dark";
          document.documentElement.classList.add("dark");
        }
      }
    </script>

    <script type="module">
      import Swiper from "https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs";

      async function getProjects() {
        const response = await fetch("/assets/projects/data.json");
        const data = await response.json();
        return data;
      }

      window.addEventListener("load", async () => {
        const projects = await getProjects();
        const projectsContainer = document.querySelector(".swiper");
        const swiperWrapper =
          projectsContainer.querySelector(".swiper-wrapper");

        projects.forEach((project) => {
          let tags = ``;
          project.tags.forEach((tag) => {
            tags += `<span class="badge mr-2 mb-2">${tag}</span>`;
          });

          const projectCard = document.createElement("div");
          projectCard.classList.add("swiper-slide", "card");
          projectCard.innerHTML = `
                <a href="${project.url}" target="_blank">
                    <img alt="${project.name}" 
                    class="w-full h-60 object-cover hover:blur transition duration-300" 
                    src="${project.photo_path}">
                </a>
                <div class="px-6 py-4">
                    <a href="${project.url}" target="_blank"
                    class="font-bold text-xl text-primary-400 hover:text-primary-100 transition duration-300">${project.name}</a>
                    <p class="text-gray-200 mt-2">${project.description}</p>
                    <div class="mt-4">
                        ${tags}
                    </div>
                </div>
            </div>`;

          swiperWrapper.appendChild(projectCard);

          const swiper = new Swiper(".swiper", {
            slidesPerView: "auto",
            spaceBetween: 20,
            pagination: {
              el: ".swiper-pagination",
            },
            navigation: {
              nextEl: ".swiper-button-next-c",
              prevEl: ".swiper-button-prev-c",
            },
          });
        });
      });
